<div class="background-canvas dot-grid"></div>
<div class="terminal-container">
  <div class="window-frame">
    <div class="window-header">
      <div class="window-controls">
        <span class="control-dot coral"></span>
        <span class="control-dot yellow"></span>
        <span class="control-dot gray"></span>
      </div>
      <div class="window-title">incident_response.sh</div>
    </div>
    <div class="crt-screen" [class.powered-off]="isPoweredOff">
      <div class="scanlines"></div>
      <div class="hero">
        <h1>{{ displayedTitle }}<span class="cursor" [class.hidden]="!showCursor">_</span></h1>
        <div class="content-reveal" [class.visible]="showContent">
          <h2>{{ heroText }}</h2>
          <button class="nb-button orange" (click)="onCTAButtonClick()">{{ ctaButtonText }}</button>
        </div>
      </div>
    </div>
  </div>
</div>
