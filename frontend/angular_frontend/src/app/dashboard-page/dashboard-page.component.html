<div class="dashboard-grid">
  <div class="card-container sidebar">
    <div class="nb-card scenarios">
      <div class="nb-card-content scenarios">
        <div class="card-container">
          <app-scenario-button [scenarioName]="'Data Breach Investigation'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Phishing Campaign Response'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Ransomware Mitigation'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Insider Threat Detection'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'SQL Injection Prevention'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'DDoS Attack Defense'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Unauthorized Access Audit'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Cloud Security Misconfiguration'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'API Vulnerability Scan'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Social Engineering Test'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Zero-Day Exploit Response'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Malware Sandboxing Analysis'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Network Intrusion Forensics'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Credential Stuffing Defense'"></app-scenario-button>
          <app-scenario-button [scenarioName]="'Compliance Audit Prep'"></app-scenario-button>
        </div>
      </div>
    </div>
  </div>

  <div class="card-container content-area">
    <div class="nb-card details">
      <div class="nb-card-content">
        <!-- Nested Title Card -->
        <div class="nb-card nested-title-card">
          <div class="nb-card-content">
            <h2 class="nb-card-title">Scenario Details</h2>
          </div>
        </div>

        <!-- Nested Body Card -->
        <div class="nb-card nested-body-card">
          <div class="nb-card-content">
            <div class="scenario-details-body">
              <p class="nb-card-text">Select a scenario from the left to view details and start the interactive
                simulation or test your knowledge with a quiz.</p>
            </div>
            <div class="button-group">
              <button class="nb-button blue">Start Scenario</button>
              <button class="nb-button green">Start Quiz</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
