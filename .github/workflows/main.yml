name: Test Deploy Django + Angular over WireGuard

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install WireGuard, sshpass, Node, Python
        run: |
          sudo apt update
          sudo apt install -y wireguard sshpass npm python3-venv python3-pip

      - name: Setup WireGuard
        run: |
          sudo mkdir -p /etc/wireguard
          sudo bash -c 'cat > /etc/wireguard/wg0.conf <<EOF
          [Interface]
          PrivateKey = ${{ secrets.WG_PRIVATE_KEY }}
          Address = 10.8.0.6/32
          MTU = 1100

          [Peer]
          PublicKey = ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          AllowedIPs = 10.20.20.0/24
          Endpoint = ${{ secrets.WG_ENDPOINT }}
          PersistentKeepalive = 25
          EOF'

      - name: Bring up WireGuard
        run: |
          sudo wg-quick up wg0
          sleep 2
          # Force MTU to ultra-conservative limit for stable VPN transport
          sudo ip link set dev wg0 mtu 1100
          # Force MSS clamping to a fixed safe value (MTU - 40)
          sudo iptables -t mangle -A POSTROUTING -p tcp --tcp-flags SYN,RST SYN -o wg0 -j TCPMSS --set-mss 1060
          ip addr show wg0
          ip route show
          nc -vz ${{ secrets.SSH_HOST }} 22 || echo "TCP to SSH port failed"

      - name: Add SSH hosts to known_hosts
        run: |
          mkdir -p ~/.ssh
          sleep 2
          ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts || true
          ssh-keyscan 10.20.20.25 >> ~/.ssh/known_hosts || true

      - name: Deploy Django + Angular (Web VM)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -v -T \
            -o StrictHostKeyChecking=no \
            -o IPQoS=none \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o SendEnv=none \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          
          # Git Optimizations for unstable networks
          git config --global core.compression 0
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 524288000
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 256m
          
          cd ~
          if [ ! -d "IncidentResponseSimulator/.git" ]; then
            echo "📦 Cloning repository for first time"
            git clone https://github.com/friesentyler/IncidentResponseSimulator.git
          fi
          
          cd IncidentResponseSimulator
          echo "📥 Pulling latest code for branch: ${{ github.ref_name }}"
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          chmod +x deployment/deploy.sh
          
          echo "🔐 Running deployment script"
          STRIPE_SECRET_KEY='${{ secrets.STRIPE_SECRET_KEY }}' \
          STRIPE_PRODUCT_ID='${{ secrets.STRIPE_PRODUCT_ID }}' \
          STRIPE_PUBLISHABLE_KEY='${{ secrets.STRIPE_PUBLISHABLE_KEY }}' \
          EXECUTION_SERVICE_URL='http://10.20.20.25:5001' \
          SSH_HOST='${{ secrets.SSH_HOST }}' \
          DEBUG=False \
          ./deployment/deploy.sh
          EOF

      - name: Deploy Execution Service (Attack VM)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -v -T \
            -o StrictHostKeyChecking=no \
            -o IPQoS=none \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o SendEnv=none \
            ${{ secrets.SSH_USER }}@10.20.20.25 << 'EOF'
          set -e
          echo "🚀 Configuring network for VPN compatibility"
          # 1. Set MTU to 1200 (Extra conservative for double VPNs)
          INTERFACE=$(ip route | grep default | awk '{print $5}' | head -n 1)
          if [ -n "$INTERFACE" ]; then
            echo "🔧 Setting MTU on $INTERFACE to 1200"
            ip link set dev "$INTERFACE" mtu 1200 || echo "⚠️ Could not set MTU"
          fi
          
          # 2. Add MSS Clamping
          iptables -t mangle -A POSTROUTING -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu || echo "⚠️ Could not set iptables MSS clamping"
          
          # 3. Git Optimizations for unstable networks
          git config --global core.compression 0
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 524288000
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 256m

          echo "🚀 Deploying Execution Service to Attack VM"
          cd ~
          if [ ! -d "IncidentResponseSimulator/.git" ]; then
            echo "📦 Cloning repository for first time"
            export GIT_TERMINAL_PROMPT=0
            git clone --depth 1 https://github.com/friesentyler/IncidentResponseSimulator.git
          fi
          
          cd IncidentResponseSimulator
          echo "📥 Pulling latest code for branch: ${{ github.ref_name }}"
          git fetch --depth 1 origin ${{ github.ref_name }}
          git reset --hard FETCH_HEAD
          
          chmod +x deployment/deploy_execution.sh
          echo "🔐 Running execution deployment script"
          ./deployment/deploy_execution.sh
          EOF
