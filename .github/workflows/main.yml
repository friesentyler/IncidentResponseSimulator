name: Test Deploy Django + Angular over WireGuard

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install WireGuard, sshpass, Node, Python
        run: |
          sudo apt update
          sudo apt install -y wireguard sshpass npm python3-venv python3-pip

      - name: Setup WireGuard
        run: |
          sudo mkdir -p /etc/wireguard
          sudo bash -c 'cat > /etc/wireguard/wg0.conf <<EOF
          [Interface]
          PrivateKey = ${{ secrets.WG_PRIVATE_KEY }}
          Address = 10.8.0.6/24

          [Peer]
          PublicKey = ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          AllowedIPs = 10.10.0.0/16
          Endpoint = ${{ secrets.WG_ENDPOINT }}
          PersistentKeepalive = 25
          EOF'

      - name: Bring up WireGuard
        run: |
          sudo wg-quick up wg0
          sleep 2
          ip addr show wg0
          ip route show
          nc -vz ${{ secrets.SSH_HOST }} 22 || echo "TCP to SSH port failed"

      - name: Add SSH host to known_hosts
        run: |
          mkdir -p ~/.ssh
          sleep 2
          ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts || true

      - name: Test deploy Django + Angular
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -vvv -T \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          echo "Connected successfully!"

          set -e

          echo "🚀 Starting test deployment"

          cd ~

          if [ ! -d "IncidentResponseSimulator/.git" ]; then
            echo "📦 Cloning repository for first time"
            git clone https://github.com/friesentyler/IncidentResponseSimulator.git
          fi

          cd IncidentResponseSimulator

          echo "📌 Killing previous servers (if any)"
          pkill -f "manage.py runserver" || true
          pkill -f "ng serve" || true

          echo "📥 Pulling latest code"
          git fetch origin
          git reset --hard origin/master

          ###################################
          # BACKEND (Django)
          ###################################
          cd backend

          echo "🔐 Writing .env file"
          cat > .env <<-EOL
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRODUCT_ID=${{ secrets.STRIPE_PRODUCT_ID }}
          EXECUTION_SERVICE_URL=${{ secrets.EXECUTION_SERVICE_URL }}
          EOL

          echo "🐍 Setting up virtualenv"
          python3.14 -m venv venv || true
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          echo "🔄 Running DB migrations"
          python manage.py makemigrations
          python manage.py migrate

          echo "🏃 Running Django server in background"
          nohup python django_backend/manage.py runserver 0.0.0.0:8000 > django.log 2>&1 &

          ###################################
          # FRONTEND (Angular)
          ###################################
          cd ../../frontend/angular_frontend

          echo "📦 Installing frontend dependencies"
          npm install

          echo "🔧 Creating Angular environment file dynamically"
          mkdir -p src/environments
          cat > src/environments/environment.ts <<EOL
          export const environment = {
            production: false,
            apiUrl: 'http://127.0.0.1:8000/api/',
            stripePublishableKey: '${{ secrets.STRIPE_PUBLISHABLE_KEY }}'
          };
          EOL

          echo "🏃 Running Angular server in background"
          nohup ng serve --host 0.0.0.0 --port 4200 > angular.log 2>&1 &

          echo "✅ Test deployment started and previous servers killed"
          EOF
