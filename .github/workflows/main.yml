name: Test Deploy Django + Angular over WireGuard

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install WireGuard, sshpass, Node, Python
        run: |
          sudo apt update
          sudo apt install -y wireguard sshpass npm python3-venv python3-pip

      - name: Setup WireGuard
        run: |
          sudo mkdir -p /etc/wireguard
          sudo bash -c 'cat > /etc/wireguard/wg0.conf <<EOF
          [Interface]
          PrivateKey = ${{ secrets.WG_PRIVATE_KEY }}
          Address = 10.8.0.6/24
          MTU = 1300

          [Peer]
          PublicKey = ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          AllowedIPs = 10.10.0.0/16
          Endpoint = ${{ secrets.WG_ENDPOINT }}
          PersistentKeepalive = 25
          EOF'

      - name: Bring up WireGuard
        run: |
          sudo wg-quick up wg0
          sleep 2
          # Force MTU to confirmed safe limit of 1300
          sudo ip link set dev wg0 mtu 1300
          # Clamp MSS to PMTU (prevents SSH hanging on multi-hop routes)
          sudo iptables -t mangle -A POSTROUTING -p tcp --tcp-flags SYN,RST SYN -o wg0 -j TCPMSS --clamp-mss-to-pmtu
          ip addr show wg0
          ip route show
          nc -vz ${{ secrets.SSH_HOST }} 22 || echo "TCP to SSH port failed"

      - name: Add SSH hosts to known_hosts
        run: |
          mkdir -p ~/.ssh
          sleep 2
          ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts || true
          ssh-keyscan 10.10.40.18 >> ~/.ssh/known_hosts || true

      - name: Deploy Django + Angular (Web VM)
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -vvv -T \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          
          cd ~
          if [ ! -d "IncidentResponseSimulator/.git" ]; then
            echo "📦 Cloning repository for first time"
            git clone https://github.com/friesentyler/IncidentResponseSimulator.git
          fi
          
          cd IncidentResponseSimulator
          echo "📥 Pulling latest code for branch: ${{ github.ref_name }}"
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          chmod +x deployment/deploy.sh
          
          echo "🔐 Running deployment script"
          STRIPE_SECRET_KEY='${{ secrets.STRIPE_SECRET_KEY }}' \
          STRIPE_PRODUCT_ID='${{ secrets.STRIPE_PRODUCT_ID }}' \
          STRIPE_PUBLISHABLE_KEY='${{ secrets.STRIPE_PUBLISHABLE_KEY }}' \
          EXECUTION_SERVICE_URL='http://10.10.40.18:5001' \
          SSH_HOST='${{ secrets.SSH_HOST }}' \
          DEBUG=False \
          ./deployment/deploy.sh
          EOF

      - name: Deploy Execution Service (Attack VM)
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -vvv -T \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@10.10.40.18 << 'EOF'
          set -e
          echo "🚀 Configuring network for VPN compatibility (MTU 1300)"
          # Find the default interface and set its MTU to 1300
          INTERFACE=$(ip route | grep default | awk '{print $5}' | head -n 1)
          if [ -n "$INTERFACE" ]; then
            echo "🔧 Setting MTU on $INTERFACE to 1300"
            ip link set dev "$INTERFACE" mtu 1300 || echo "⚠️ Could not set MTU. Continuing..."
          fi
          
          echo "🚀 Deploying Execution Service to Attack VM"
          
          cd ~
          if [ ! -d "IncidentResponseSimulator/.git" ]; then
            echo "📦 Cloning repository for first time"
            git clone https://github.com/friesentyler/IncidentResponseSimulator.git
          fi
          
          cd IncidentResponseSimulator
          echo "📥 Pulling latest code for branch: ${{ github.ref_name }}"
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          
          chmod +x deployment/deploy_execution.sh
          echo "🔐 Running execution deployment script"
          ./deployment/deploy_execution.sh
          EOF
