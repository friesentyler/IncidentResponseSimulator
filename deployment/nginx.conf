server {
    listen 80 default_server;
    server_name 10.10.40.15; 

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Angular app (Frontend)
    location / {
        root {{PROJECT_ROOT}}/frontend/angular_frontend/dist/angular_frontend/browser;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache Angular index for 0 time (always re-validate)
        # but cache its assets
        add_header Cache-Control "no-cache";
    }

    # Static Assets (JS, CSS, Images with hashes)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root {{PROJECT_ROOT}}/frontend/angular_frontend/dist/angular_frontend/browser;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Django API (Backend)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for slow API calls
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static Files (e.g., admin assets)
    location /static/ {
        alias {{PROJECT_ROOT}}/backend/django_backend/static/;
        expires 1y;
        add_header Cache-Control "public";
    }
 
    # Django Media Files (User uploads)
    location /media/ {
        alias {{PROJECT_ROOT}}/backend/django_backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
