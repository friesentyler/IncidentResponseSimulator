server {
    listen 80;
    server_name _; # Replace with your domain or IP if needed

    # Angular app (Frontend)
    location / {
        root {{PROJECT_ROOT}}/frontend/angular_frontend/dist/angular_frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Django API (Backend)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static Files (e.g., admin assets)
    location /static/ {
        alias {{PROJECT_ROOT}}/backend/django_backend/static/;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
